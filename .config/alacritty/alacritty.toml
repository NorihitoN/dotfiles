[general]
import = [
    "~/.config/alacritty/themes/themes/nightfox.toml"
]

[window]
# padding = { x = 0, y = 0 }
opacity = 0.85
blur = true
startup_mode = "Maximized"
decorations = "None"

[scrolling]
history = 100000
multiplier = 5

[font]
size = 14.0
offset = { x = 0, y = 4 }
normal = { family = "Hack Nerd Font", style="Regular" }
bold = { family = "Hack Nerd Font", style="Regular" }
italic = { family = "Hack Nerd Font", style="Italic" }
bold_italic = { family = "Hack Nerd Font", style="Italic" }

[terminal]
shell = { program = "/bin/zsh", args = ["-l", "-c", "tmux a -t 0 || tmux"] }

[env]
TERM = "xterm-256color"

[cursor]
style = { shape = "Beam", blinking = "Always" }

[selection]
save_to_clipboard = true
